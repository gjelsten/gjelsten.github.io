  <!-- Hero background video (FILMS page) -->
  <script src="https://player.vimeo.com/api/player.js"></script>
  <script>
    (function () {
      var VIDEO_ID = 1207173424;
      var player = null;
      var initializing = false;

      function whenSdkReady(cb) {
        if (typeof Vimeo !== 'undefined' && Vimeo.Player) { cb(); return; }
        var tries = 0;
        var timer = setInterval(function () {
          if (typeof Vimeo !== 'undefined' && Vimeo.Player) {
            clearInterval(timer);
            cb();
          } else if (++tries > 100) {
            clearInterval(timer); // give up after ~5s, poster stays
          }
        }, 50);
      }

      function initHeroVideo() {
        if (initializing) return;
        var frame = document.getElementById('heroBgVideo');
        if (!frame || typeof Vimeo === 'undefined' || !Vimeo.Player) return;

        initializing = true;

        if (player) {
          try { player.destroy(); } catch (e) {}
          player = null;
        }
        frame.innerHTML = '';

        var item = frame.closest('.hero-bg-video');
        var poster = item ? item.querySelector('.hero-bg-video-poster') : null;

        player = new Vimeo.Player(frame, {
          id: VIDEO_ID,
          background: true,   // autoplay + muted + loop + no controls + no branding
          autoplay: true,
          loop: true,
          muted: true,
          controls: false,
          responsive: false
        });

        player.ready().then(function () {
          initializing = false;
        }).catch(function () {
          initializing = false;
        });

        // Reveal video once it actually plays; otherwise keep the poster (mobile autoplay block)
        player.play().then(function () {
          if (poster) poster.classList.add('is-hidden-poster');
        }).catch(function () {
          if (poster) poster.classList.remove('is-hidden-poster');
        });
      }

      document.addEventListener('DOMContentLoaded', function () {
        whenSdkReady(initHeroVideo);

        // films.js restores the hero markup when filtering back to "All" —
        // re-initialize the player whenever the frame exists without an iframe.
        var heroWrap = document.querySelector('.portfolio-hero');
        if (heroWrap) {
          new MutationObserver(function () {
            var frame = document.getElementById('heroBgVideo');
            if (frame && !frame.querySelector('iframe') && !initializing) {
              whenSdkReady(initHeroVideo);
            }
          }).observe(heroWrap, { childList: true, subtree: true });
        }
      });
    })();
  </script>
